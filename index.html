<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nyans — A color palette generator based on OKLCH</title>
    <meta
      name="description"
      content="Create beautiful, accessible color palettes powered by OKLCH color space."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Nyans — A color palette generator based on OKLCH" />
    <meta
      property="og:description"
      content="Create beautiful, accessible color palettes powered by OKLCH color space."
    />
    <meta property="og:image" content="https://farve.co/og-image.svg" />
    <meta property="og:url" content="https://farve.co" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nyans — A color palette generator based on OKLCH" />
    <meta
      name="twitter:description"
      content="Create beautiful, accessible color palettes powered by OKLCH color space."
    />
    <meta name="twitter:image" content="https://farve.co/og-image.svg" />
    <script>
      (function () {
        var t = localStorage.getItem("nyans-theme");
        if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="app" stagger-reveal>
      <palette-toolbar></palette-toolbar>
      <bezier-editor></bezier-editor>
      <div>
        <palettes-header class="block mb-m mt-xl"></palettes-header>
        <div id="palettes" class="grid gap-4xl"></div>
        <palettes-footer class="mt-3xl block"></palettes-footer>
      </div>
    </div>

        width="24"

        viewBox="0 0 24 24"

        stroke="currentColor"

        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-plus-icon lucide-plus"

        <path d="M5 12h14" />

        id="icon-clone"

    <script src="src/main.ts" type="module"></script>
